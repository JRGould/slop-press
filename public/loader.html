<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SlopPress dev</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root {
      --bg: #0f1115;
      --fg: #e6e6e6;
      --muted: #8a8f98;
      --accent: #7dd3fc;
      --card-bg: #161923;
      --border: #242837;
      --add: #3fb950;
      --del: #f85149;
      --warn: #d29922;
      --tool-bg: #0d2033;
      --tool-fg: var(--accent);
      --think-bg: #1f1806;
      --think-fg: var(--warn);
      --render-bg: #0c2014;
      --render-fg: var(--add);
      --err-bg: #200c0c;
      --err-fg: var(--del);
      --panel-w: 400px;
      --header-h: 38px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }

    .shell {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ── Page frame ─────────────────────────────────────────── */
    #page-frame {
      flex: 1 1 0;
      min-width: 0;
      border: none;
      background: #fff;
    }

    /* ── Panel ──────────────────────────────────────────────── */
    #panel {
      width: var(--panel-w);
      flex: 0 0 var(--panel-w);
      background: var(--bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: flex-basis 0.15s ease, width 0.15s ease;
      font-family: var(--mono);
      font-size: 12px;
    }
    #panel.collapsed {
      width: 30px;
      flex-basis: 30px;
    }

    .panel-header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-header .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
    }
    .panel-header .dot.idle { background: var(--muted); box-shadow: none; animation: none; }
    .panel-header .dot { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.25} }
    .panel-header .title { font-weight: 600; color: var(--fg); font-size: 12px; white-space: nowrap; overflow: hidden; }
    .panel-header .status { color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
    .toggle-btn {
      margin-left: auto;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 14px; padding: 2px 4px;
      flex-shrink: 0;
      line-height: 1;
    }
    .toggle-btn:hover { color: var(--fg); }
    #panel.collapsed .panel-header .title,
    #panel.collapsed .panel-header .status { display: none; }
    #panel.collapsed .panel-header .dot { display: none; }
    #panel.collapsed .toggle-btn { margin-left: 0; }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }
    #panel.collapsed .panel-body { display: none; }

    /* ── Request groups ─────────────────────────────────────── */
    .req-group {
      border-bottom: 1px solid var(--border);
    }
    .req-group-header {
      padding: 8px 10px;
      background: #0c0f18;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    .req-group-header:hover { background: #13172a; }
    .req-group-header .method {
      font-size: 10px; font-weight: 700; padding: 1px 5px;
      border-radius: 3px; letter-spacing: .5px;
      background: #1a2540; color: var(--accent);
    }
    .req-group-header .path { color: var(--fg); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .req-group-header .chev { color: var(--muted); font-size: 10px; flex-shrink: 0; }
    .req-group-body { display: none; }
    .req-group.open .req-group-body { display: block; }
    .req-group.open .req-group-header .chev::before { content: "▾"; }
    .req-group-header .chev::before { content: "▸"; }

    /* ── Event cards ────────────────────────────────────────── */
    .ev {
      border-bottom: 1px solid #1a1f2e;
    }
    .ev summary {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }
    .ev summary::-webkit-details-marker { display: none; }
    .ev summary:hover { background: rgba(255,255,255,.03); }
    .ev > summary .chev { color: var(--muted); font-size: 10px; width: 10px; flex-shrink: 0; }
    .ev[open] > summary .chev::before { content: "▾"; }
    .ev > summary .chev::before { content: "▸"; }

    .badge {
      font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
      text-transform: uppercase; letter-spacing: .5px; white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-req    { background: #1a2540; color: var(--accent); }
    .badge-llm    { background: #1e1e30; color: #a78bfa; }
    .badge-think  { background: var(--think-bg); color: var(--think-fg); }
    .badge-text   { background: #162020; color: #6ee7b7; }
    .badge-tool   { background: var(--tool-bg); color: var(--tool-fg); }
    .badge-result { background: #0f1f0f; color: #86efac; }
    .badge-state  { background: #1a1200; color: var(--warn); }
    .badge-render { background: var(--render-bg); color: var(--render-fg); }
    .badge-err    { background: var(--err-bg); color: var(--err-fg); }

    .ev .label { color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }

    .ev .body {
      padding: 0 10px 8px 10px;
      color: #c9d1d9;
    }
    .ev .body pre {
      margin: 4px 0 0;
      background: #0c0e14;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px;
      overflow-x: auto;
      font-family: var(--mono);
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow-y: auto;
    }
    .ev .body .label2 { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; margin-top: 6px; }
    .diff-add { color: var(--add); }
    .diff-del { color: var(--del); }
    .stream-pre { min-height: 1.4em; }
  </style>
</head>
<body>
  <div class="shell">
    <iframe id="page-frame" title="Rendered page"></iframe>
    <aside id="panel">
      <div class="panel-header">
        <span class="dot" id="status-dot"></span>
        <span class="title">SlopPress</span>
        <span class="status" id="status-text">connecting…</span>
        <button class="toggle-btn" id="toggle-btn" title="Toggle panel">◀</button>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </aside>
  </div>

  <script>
    const INITIAL_RID = "__SLOPPRESS_RID__";
    const panel = document.getElementById("panel");
    const panelBody = document.getElementById("panel-body");
    const statusDot = document.getElementById("status-dot");
    const statusText = document.getElementById("status-text");
    const toggleBtn = document.getElementById("toggle-btn");
    const pageFrame = document.getElementById("page-frame");

    // ── Panel collapse ──────────────────────────────────────────
    let panelCollapsed = false;
    function togglePanel() {
      panelCollapsed = !panelCollapsed;
      panel.classList.toggle("collapsed", panelCollapsed);
      toggleBtn.textContent = panelCollapsed ? "▶" : "◀";
    }
    toggleBtn.addEventListener("click", togglePanel);

    // ── Utilities ───────────────────────────────────────────────
    function esc(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function jsonPre(v) {
      let s;
      try { s = typeof v === "string" ? v : JSON.stringify(v, null, 2); }
      catch { s = String(v); }
      return "<pre>" + esc(s) + "</pre>";
    }

    function setStatus(text, streaming) {
      statusText.textContent = text;
      statusDot.classList.toggle("idle", !streaming);
    }

    // ── Request group ───────────────────────────────────────────
    let currentGroup = null;

    function openGroup(method, url) {
      // Collapse the previous group
      if (currentGroup) currentGroup.classList.remove("open");

      const g = document.createElement("div");
      g.className = "req-group open";
      g.innerHTML =
        '<div class="req-group-header">' +
          '<span class="method">' + esc(method) + '</span>' +
          '<span class="path">' + esc(url) + '</span>' +
          '<span class="chev"></span>' +
        '</div>' +
        '<div class="req-group-body"></div>';
      g.querySelector(".req-group-header").addEventListener("click", () => {
        g.classList.toggle("open");
      });
      panelBody.appendChild(g);
      currentGroup = g;
      panelBody.scrollTop = panelBody.scrollHeight;
      return g.querySelector(".req-group-body");
    }

    let groupBody = null;

    function addCard(badgeClass, badgeText, labelText, bodyHtml, open) {
      const d = document.createElement("details");
      d.className = "ev";
      if (open) d.setAttribute("open", "");
      d.innerHTML =
        '<summary>' +
          '<span class="chev"></span>' +
          '<span class="badge ' + badgeClass + '">' + esc(badgeText) + '</span>' +
          '<span class="label">' + esc(labelText) + '</span>' +
        '</summary>' +
        '<div class="body">' + bodyHtml + '</div>';
      (groupBody ?? panelBody).appendChild(d);
      panelBody.scrollTop = panelBody.scrollHeight;
      return d;
    }

    // ── Streaming delta cards ───────────────────────────────────
    let thinkCard = null, thinkPre = null;
    let textCard = null, textPre = null;

    function resetStream() {
      thinkCard = null; thinkPre = null;
      textCard = null; textPre = null;
    }

    function appendDelta(kind, text) {
      if (kind === "thinking") {
        if (!thinkCard) {
          thinkCard = addCard("badge-think", "Thinking", "(streaming)", '<pre class="stream-pre"></pre>', true);
          thinkPre = thinkCard.querySelector("pre");
        }
        thinkPre.textContent += text;
      } else {
        if (!textCard) {
          textCard = addCard("badge-text", "Text", "(streaming)", '<pre class="stream-pre"></pre>', true);
          textPre = textCard.querySelector("pre");
        }
        textPre.textContent += text;
      }
      panelBody.scrollTop = panelBody.scrollHeight;
    }

    // ── Event renderers ─────────────────────────────────────────
    function onEvRequest(ev) {
      const r = ev.request;
      groupBody = openGroup(r.method, r.url);
      resetStream();

      const hdrs = Object.entries(r.headers || {}).map(([k,v]) => k + ": " + v).join("\n");
      const body2 = r.body ? "\n\n" + r.body : "";
      addCard("badge-req", "Request", r.method + " " + r.url,
        '<pre>' + esc(r.method + " " + r.url + " HTTP/1.1\n" + hdrs + body2) + '</pre>',
        false);
    }

    function onEvLlmRequest(ev) {
      const msgCount = Array.isArray(ev.messages) ? ev.messages.length : 0;
      // Show the last user message content in full (that's the interesting one — the request envelope).
      let detail = "";
      if (Array.isArray(ev.messages)) {
        for (let i = ev.messages.length - 1; i >= 0; i--) {
          const m = ev.messages[i];
          if (m && m.role === "user" && typeof m.content === "string") {
            detail = '<div class="label2">User message</div><pre>' + esc(m.content) + '</pre>';
            break;
          }
        }
      }
      addCard("badge-llm", "LLM call", ev.model + " · " + msgCount + " msgs",
        '<pre>model: ' + esc(ev.model) + '\nmessages: ' + msgCount + '\ntools: ' +
          (Array.isArray(ev.tools) ? ev.tools.map(t => t.function?.name).join(", ") : "?") + '</pre>' +
          detail,
        false);
      resetStream();
    }

    function onEvToolCall(ev) {
      let argsStr;
      try { argsStr = JSON.stringify(ev.args, null, 2); } catch { argsStr = String(ev.args); }
      addCard("badge-tool", "Tool call", ev.name,
        '<pre>' + esc("id: " + ev.id + "\nname: " + ev.name + "\nargs:\n" + argsStr) + '</pre>',
        true);
    }

    function onEvToolResult(ev) {
      let resStr;
      try { resStr = JSON.stringify(ev.result, null, 2); } catch { resStr = String(ev.result); }
      addCard("badge-result", "Tool result", ev.name,
        '<pre>' + esc(resStr) + '</pre>',
        false);
    }

    function onEvStateWrite(ev) {
      const diffHtml = ev.diff.split("\n").map(line => {
        if (line.startsWith("+")) return '<span class="diff-add">' + esc(line) + '</span>';
        if (line.startsWith("-")) return '<span class="diff-del">' + esc(line) + '</span>';
        return esc(line);
      }).join("\n");
      addCard("badge-state", "State write", ev.file,
        '<pre>' + diffHtml + '</pre>',
        true);
    }

    function onEvRender(ev) {
      const r = ev.response;
      const cookieStr = (r.set_cookies || []).join("\n");
      addCard("badge-render", "Render", "status " + r.status + " · " + (r.body || "").length + " bytes",
        '<pre>' + esc(
          "status: " + r.status + "\n" +
          "headers: " + JSON.stringify(r.headers || {}, null, 2) +
          (cookieStr ? "\nset-cookies:\n" + cookieStr : "") +
          "\nbody (" + (r.body || "").length + " bytes):\n" + (r.body || "").slice(0, 800)
        ) + '</pre>',
        true);
      setStatus("rendered · " + r.status, false);
      applyRender(r);
    }

    function onEvError(ev) {
      addCard("badge-err", "Error", ev.message || "unknown",
        '<pre>' + esc(ev.message || "unknown error") + '</pre>',
        true);
      setStatus("error", false);
    }

    // ── Apply render to iframe ──────────────────────────────────
    function applyRender(r) {
      // Set cookies (HttpOnly not possible from JS — acceptable for localhost dev).
      for (const raw of r.set_cookies || []) {
        try { document.cookie = raw; } catch {}
      }

      const loc = r.headers && (r.headers.Location || r.headers.location);
      if (r.status >= 300 && r.status < 400 && loc) {
        // Redirect: navigate via the interception layer rather than assigning
        // to the iframe so we show the next request in the panel.
        navigate("GET", loc, null, {});
        return;
      }

      // Inject the navigation-interception script right before </body>.
      const injected = injectInterceptor(r.body || "");
      pageFrame.srcdoc = injected;
      pageFrame.onload = () => attachIframeInterceptors();
    }

    function injectInterceptor(html) {
      const script = `<script data-sloppress>
(function(){
  function relay(method,url,body,hdrs){
    window.parent.postMessage({type:'slop-nav',method,url,body,headers:hdrs},'*');
  }
  document.addEventListener('click',function(e){
    var a=e.target.closest('a[href]');
    if(!a)return;
    var href=a.getAttribute('href');
    if(!href||href.startsWith('#')||href.startsWith('javascript')||a.target==='_blank')return;
    e.preventDefault();e.stopPropagation();
    relay('GET',a.href,null,{});
  },true);
  document.addEventListener('submit',function(e){
    e.preventDefault();e.stopPropagation();
    var f=e.target,method=(f.method||'get').toUpperCase();
    var action=f.action||window.location.href;
    if(method==='GET'){
      var p=new URLSearchParams(new FormData(f));
      var u=new URL(action);u.search=p.toString();
      relay('GET',u.href,null,{});
    }else{
      var body=new URLSearchParams(new FormData(f)).toString();
      relay('POST',action,body,{'content-type':'application/x-www-form-urlencoded'});
    }
  },true);
})();
<\/script>`;
      // Insert before </body> if present, otherwise append.
      const idx = html.lastIndexOf("</body>");
      return idx >= 0 ? html.slice(0, idx) + script + html.slice(idx) : html + script;
    }

    function attachIframeInterceptors() {
      // postMessage listener is already set up globally below.
      // Nothing else needed — the injected script does the work.
    }

    window.addEventListener("message", (e) => {
      if (!e.data || e.data.type !== "slop-nav") return;
      const { method, url, body, headers } = e.data;
      try {
        const u = new URL(url);
        navigate(method, u.pathname + u.search, body || null, headers || {});
      } catch {
        navigate(method, url, body || null, headers || {});
      }
    });

    // ── SSE stream management ────────────────────────────────────
    let currentSrc = null;

    function openStream(rid) {
      if (currentSrc) { try { currentSrc.close(); } catch {} currentSrc = null; }
      setStatus("streaming…", true);
      const src = new EventSource("/__slop/stream?rid=" + encodeURIComponent(rid));
      currentSrc = src;

      function dispatch(data) {
        let ev;
        try { ev = JSON.parse(data); } catch { return; }
        switch (ev.type) {
          case "request":       onEvRequest(ev);     break;
          case "llm_request":   onEvLlmRequest(ev);  break;
          case "thinking_delta": appendDelta("thinking", ev.text); break;
          case "llm_delta":     appendDelta("text", ev.text);     break;
          case "tool_call":     onEvToolCall(ev);    break;
          case "tool_result":   onEvToolResult(ev);  break;
          case "state_write":   onEvStateWrite(ev);  break;
          case "render":        onEvRender(ev); src.close(); break;
          case "error":         onEvError(ev); src.close();  break;
        }
      }

      for (const t of ["request","llm_request","llm_delta","thinking_delta",
                       "tool_call","tool_result","state_write","render","error"]) {
        src.addEventListener(t, e => dispatch(e.data));
      }
      src.onmessage = e => dispatch(e.data);
      src.onerror = () => { setStatus("connection lost", false); };
    }

    // ── Navigation ───────────────────────────────────────────────
    function navigate(method, url, body, extraHeaders, fromPopState) {
      setStatus("loading " + url + "…", true);
      const headers = Object.assign({}, extraHeaders);
      if (document.cookie) headers["cookie"] = document.cookie;

      // GET navigations update the URL bar and push a history entry so the
      // browser back/forward buttons can move between pages. POSTs mirror
      // browser behavior — the URL only changes when the handler's redirect
      // follow-up (a GET) runs through navigate() again.
      if (method === "GET" && !fromPopState) {
        try {
          const abs = new URL(url, window.location.href);
          const target = abs.pathname + abs.search + abs.hash;
          if (target !== window.location.pathname + window.location.search + window.location.hash) {
            window.history.pushState({ slop: true, url: target }, "", target);
          }
        } catch {}
      }

      fetch("/__slop/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ method, url, body, headers }),
      })
        .then(r => r.json())
        .then(({ rid }) => openStream(rid))
        .catch(err => {
          setStatus("submit error: " + err, false);
        });
    }

    window.addEventListener("popstate", () => {
      const target = window.location.pathname + window.location.search;
      navigate("GET", target, null, {}, true);
    });

    // ── Boot ─────────────────────────────────────────────────────
    // Anchor the initial history entry so the first back/forward lands here.
    try {
      const here = window.location.pathname + window.location.search + window.location.hash;
      window.history.replaceState({ slop: true, url: here }, "", here);
    } catch {}
    openStream(INITIAL_RID);
  </script>
</body>
</html>
